name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Build release zip
        run: |
          mkdir -p release
          cp dist/index.js release/
          cp plugin.json release/
          [ -f schema.sql ] && cp schema.sql release/ || true
          cd release && zip -r ../plugin.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.zip
